# ─── Application ──────────────────────────────────────────────────────────────
spring.application.name=roundtable
server.port=8080

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/roundtable
spring.datasource.username=roundtable
spring.datasource.password=roundtable
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── API Keys (loaded from application-local.properties — gitignored) ─────────
# Values default to empty string if not set. isConfigured() checks for blank.
roundtable.providers.gemini.api-key=${GEMINI_API_KEY:}
roundtable.providers.groq.api-key=${GROQ_API_KEY:}
roundtable.providers.mistral.api-key=${MISTRAL_API_KEY:}
roundtable.providers.openrouter.api-key=${OPENROUTER_API_KEY:}

# ─── Provider Base URLs ───────────────────────────────────────────────────────
roundtable.providers.gemini.base-url=https://generativelanguage.googleapis.com/v1beta/models
roundtable.providers.gemini.embedding-url=https://generativelanguage.googleapis.com/v1beta/models/text-embedding-004:embedContent
roundtable.providers.groq.base-url=https://api.groq.com/openai/v1/chat/completions
roundtable.providers.mistral.base-url=https://api.mistral.ai/v1/chat/completions
roundtable.providers.openrouter.base-url=https://openrouter.ai/api/v1/chat/completions

# ─── Default Models ───────────────────────────────────────────────────────────
roundtable.providers.gemini.default-model=gemini-2.0-flash
roundtable.providers.gemini.synthesiser-model=gemini-2.0-flash
roundtable.providers.groq.default-model=llama-3.3-70b-versatile
roundtable.providers.mistral.default-model=mistral-small-latest
roundtable.providers.openrouter.default-model=mistralai/mistral-7b-instruct:free

# ─── Data Sources ─────────────────────────────────────────────────────────────
roundtable.data.yahoo-finance.base-url=https://query1.finance.yahoo.com/v8/finance
roundtable.data.fred.api-key=${FRED_API_KEY:}
roundtable.data.fred.base-url=https://api.stlouisfed.org/fred

# ─── Debate Settings ──────────────────────────────────────────────────────────
roundtable.debate.max-tokens=800
roundtable.debate.temperature=0.7
roundtable.debate.default-rounds=2
roundtable.debate.max-retries=2
roundtable.debate.context-history-rounds=3

# ─── Logging ──────────────────────────────────────────────────────────────────
# ERROR, WARN, INFO always on. TRACE off by default.
# To enable TRACE for debugging, uncomment in application-local.properties.
logging.level.root=WARN
logging.level.com.roundtable=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# File logging — 30-day rolling retention
logging.file.name=logs/roundtable.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.clean-history-on-start=false

# ─── Actuator (for runtime TRACE enabling without restart) ────────────────────
management.endpoints.web.exposure.include=loggers,health
management.endpoint.loggers.enabled=true

# ─── Active profile ───────────────────────────────────────────────────────────
# Loads application-local.properties automatically
spring.profiles.active=local
